services:
  # FastAPI Backend
  - type: web
    name: code-audit-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_API_COMPAT
        value: standard
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually in Render dashboard

  # Streamlit Frontend
  - type: web
    name: code-audit-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_BASE_URL
        sync: false  # Set to your API's public Render URL, e.g. https://code-audit-api.onrender.com
